[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

[program:php]
# O comando pode variar consoante a versão do PHP na tua imagem base. 
# Geralmente 'php-fpm' ou '/usr/sbin/php-fpm8.2'
command=php-fpm 
autostart=true
autorestart=true
priority=5
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:nginx]
command=nginx -g 'daemon off;'
autostart=true
autorestart=true
priority=10
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

# ====================================================================
# [OPCIONAL - FUTURO] Para a Sala de Silêncio (WebSockets / Reverb)
# Descomenta estas linhas quando quiseres ativar os WebSockets no Railway
# ====================================================================
[program:reverb]
 command=php /var/www/html/artisan reverb:start
 autostart=true
 autorestart=true
 priority=15
 stdout_logfile=/dev/stdout
 stdout_logfile_maxbytes=0
 stderr_logfile=/dev/stderr
 stderr_logfile_maxbytes=0

[program:worker]
process_name=%(program_name)s_%(process_num)02d
command=php /var/www/html/artisan queue:work --queue=auth-mail,default --tries=3 --backoff=30
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=root
numprocs=1
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
